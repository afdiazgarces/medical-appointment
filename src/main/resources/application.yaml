spring:
  application:
    name: medical-appointment

  # --- Base de datos H2 en memoria ---
  datasource:
    url: jdbc:h2:mem:medisalud;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # --- Consola H2 (solo para inspección en desarrollo) ---
  h2:
    console:
      enabled: true
      path: /h2-console

  # --- JPA / Hibernate ---
  # El esquema NO lo genera Hibernate: schema.sql es la fuente de verdad (ddl-auto=none).
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # --- Inicialización por scripts (schema.sql + data.sql) ---
  sql:
    init:
      mode: always
      platform: h2

  # --- Serialización JSON: fechas en ISO-8601, no como timestamps numéricos ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# --- Documentación OpenAPI / Swagger UI ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
